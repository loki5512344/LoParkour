        time: "&#00D4FF<bold>Time <reset>&#FFFFFF%s"
        high_score: "&#00D4FF<bold>High-score <reset>&#FFFFFF%s"

        formats:
          miss: "&#A0A0A0You missed your high score by %s points!"
          beat: "&#A0A0A0You beat your high score by %s points!"
          tied: "&#A0A0A0You tied your high score!"

      particles:
        material: ""
        name: "Show particles"
        lore: "&#A0A0A0Currently: %s||&#A0A0A0If enabled, every generated block||&#A0A0A0will show particles."

      sound:
        material: ""
        name: "Play sounds"
        lore: "&#A0A0A0Currently: %s||&#A0A0A0If enabled, every generated block||&#A0A0A0will play a sound."

      special_blocks:
        material: ""
        name: "Use special blocks"
        lore: "&#A0A0A0Currently: %s||&#A0A0A0If enabled, uses special blocks like ice and slabs."

      score_difficulty:
        material: ""
        name: "Score difficulty"
        lore: "&#A0A0A0Currently: %s||&#A0A0A0When enabled, the higher score you have,||&#A0A0A0the more difficult it gets."

