# -= Parkour generation settings =-
# Settings for parkour generation
generation:

  # -= Jump type =-
  # The chance of each type of jump. Can be above 100%.
  type:
    normal: 85
    special: 10
    schematic: 5

  # -= Normal jump chances =-
  normal:
    # -= Distance chances =-
    # The chances of the different distances in %. Can be above 100%.
    distance:
      1: 5
      2: 35
      3: 45
      4: 15

    # -= Height chances =-
    # The chances of the different heights a jump can have in %. Can be above 100%.
    height:
      1: 30
      0: 40
      -1: 20
      -2: 10

  # -= Special jump chances =-
  special:
    ice: 50
    slab: 30
    pane: 10
    fence: 10

  # -= Jump type variations =-
  # Chances for different jump types within normal blocks
  # These add variety to the parkour generation
  jump-types:
    normal: 70
    neo: 5
    head-hitter: 5
    fence: 10
    trapdoor: 5
    ladder: 5

  # -= Jump settings =-
  settings:

    # -= Min jump y value =-
    # The minimal y value for parkour to be generated at.
    # If you are using a custom world, you should set this to a value where the parkour won't intersect with the world.
    min-y: 100

    # -= Max jump y value =-
    # The maximum y value for parkour to be generated at.
    # If you are using a custom world, you should set this to a value where the parkour won't intersect with the world.
    max-y: 200

# -= Advanced settings =-
# Don't modify these if you don't know what you're doing!
advanced:

  # -= Spawn platform =-
  # Start area is a flat square platform at the session cell (no .lpschem island).
  island:
    
    # Legacy key (unused for spawn). Course schematics use schematics.yml / schematics-new.
    schematic-name: "island"
    
    spawn:

      # Legacy keys (unused). Platform material is parkour.first-block-material below.
      player-block: diamond_block

      # -= Spawn yaw/pitch =-
      yaw: -90
      pitch: 0

    parkour:

      # Legacy (unused). begin-block was for island schematics.
      begin-block: emerald_block

      # -= Platform + first jump pad material =-
      # The whole spawn platform uses this block type.
      first-block-material: stone

      # -= Directional heading =-
      # The directional heading of the parkour
      # Possible options: north, south, west and east.
      heading: east

  # -= Jump distance weights (advanced.distance.min .. max) =-
  distance:
    min: 1
    max: 4
    chances:
      1: 25
      2: 25
      3: 25
      4: 25

  # -= Vertical step weights (advanced.height.min .. max) =-
  height:
    min: -1
    max: 2
    chances:
      "-1": 20
      "0": 30
      1: 30
      2: 20

  # -= Block type mix (default vs special vs schematic) =-
  type:
    default: 80
    special: 15
    schematic: 5

  # -= Special block variants (BlockData strings) =-
  special:
    ice:
      material: minecraft:ice
      chance: 25
    slab:
      material: minecraft:oak_slab
      chance: 20
    pane:
      material: minecraft:glass_pane
      chance: 15
    fence:
      material: minecraft:oak_fence
      chance: 15

  # -= Border size =-
  # The diameter of the playing area of a person in the single mode.
  border-size: 10000

  # -= Schematic cooldown =-
  # The amount of blocks that provide a cooldown for the schematics.
  schematic-cooldown: 20